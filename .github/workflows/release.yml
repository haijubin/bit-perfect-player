name: Release
on:
  push:
    branches: [main]

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest] # We only need Windows for now

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # This auto-grabs version from tauri.conf.json
          releaseName: "Bit-Perfect Player v__VERSION__"
          releaseBody: "Automated Windows Build"
          releaseDraft: true
          prerelease: false
